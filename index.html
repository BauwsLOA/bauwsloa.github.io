<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Demonic Pacts League — Leaderboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-dark:    #0d0d0d;
    --bg-panel:   #161616;
    --bg-card:    #1e1e1e;
    --bg-row-a:   #1a1a1a;
    --bg-row-b:   #212121;
    --bg-hover:   #2d2d2d;
    --gold:       #c8a84b;
    --gold-light: #e8c96a;
    --gold-dim:   #7a6530;
    --gold-faint: #3a2e18;
    --red:        #8b1a1a;
    --red-light:  #c0392b;
    --green:      #2d6a2d;
    --green-light:#3a8a3a;
    --text-white: #f0ead6;
    --text-dim:   #888070;
    --text-muted: #555045;
    --border:     #333025;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: var(--bg-dark);
    color: var(--text-white);
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    overflow: hidden;
  }

  #app { display: flex; flex-direction: column; height: 100vh; }

  /* ── Header ── */
  #header {
    background: var(--bg-panel);
    border-bottom: 2px solid var(--gold-dim);
    padding: 10px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }
  .skull { font-size: 26px; color: var(--gold); line-height: 1; }
  #header-text h1 {
    font-family: 'IM Fell English', serif;
    font-size: 19px;
    color: var(--gold);
    letter-spacing: 0.04em;
  }
  #header-text p { font-size: 10px; color: var(--text-dim); margin-top: 1px; }
  #header-right { margin-left: auto; display: flex; align-items: center; gap: 16px; }
  #generated-time { font-size: 10px; color: var(--text-muted); text-align: right; line-height: 1.5; }

  /* ── Body ── */
  #body { display: flex; flex: 1; overflow: hidden; }

  /* ── Sidebar ── */
  #sidebar {
    width: 228px;
    background: var(--bg-panel);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    overflow-y: auto;
    padding-bottom: 16px;
  }
  #sidebar::-webkit-scrollbar { width: 6px; }
  #sidebar::-webkit-scrollbar-track { background: var(--bg-panel); }
  #sidebar::-webkit-scrollbar-thumb { background: var(--gold-dim); border-radius: 3px; }

  .sb-section {
    font-size: 9px; font-weight: bold; color: var(--gold-dim);
    letter-spacing: 0.08em; padding: 14px 14px 4px;
  }
  .sb-divider { height: 1px; background: var(--border); margin: 8px 10px; }

  /* Pages row */
  .pages-row {
    display: flex; align-items: center; gap: 6px;
    padding: 0 12px 6px;
    font-size: 10px; color: var(--text-dim);
  }
  .pages-row input {
    width: 46px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 3px;
    color: var(--text-white);
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    padding: 3px 6px;
    outline: none;
    text-align: center;
  }
  .pages-row input:focus { border-color: var(--gold-dim); }

  /* Fetch buttons */
  .fetch-btn {
    display: block;
    width: calc(100% - 24px);
    margin: 0 12px 4px;
    padding: 8px 10px;
    border: none;
    border-radius: 4px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    font-weight: bold;
    cursor: pointer;
    text-align: center;
    transition: filter 0.15s, opacity 0.15s;
  }
  .fetch-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .fetch-btn:not(:disabled):hover { filter: brightness(1.2); }
  #btn-fetch-lb  { background: var(--red);   color: #ffcccc; }
  #btn-fetch-reg { background: var(--green);  color: #ccffcc; }

  /* Progress bar */
  #progress-wrap {
    margin: 0 12px 10px;
    height: 5px;
    background: var(--bg-card);
    border-radius: 3px;
    overflow: hidden;
  }
  #progress-bar {
    height: 100%;
    width: 0%;
    background: var(--gold);
    border-radius: 3px;
    transition: width 0.2s;
  }

  /* Match mode */
  .match-mode { display: flex; gap: 10px; padding: 0 14px 8px; }
  .match-mode label {
    display: flex; align-items: center; gap: 5px;
    cursor: pointer; color: var(--text-dim); font-size: 10px;
  }
  .match-mode input[type=radio] { accent-color: var(--gold); }

  /* Region checkboxes */
  #region-list {
    padding: 4px 10px 6px;
    display: flex; flex-direction: column; gap: 3px;
    max-height: 280px; overflow-y: auto;
    background: var(--bg-card);
    margin: 0 12px 6px;
    border-radius: 4px;
  }
  #region-list::-webkit-scrollbar { width: 5px; }
  #region-list::-webkit-scrollbar-track { background: var(--bg-card); }
  #region-list::-webkit-scrollbar-thumb { background: var(--gold-dim); }

  .region-cb {
    display: flex; align-items: center; gap: 7px;
    cursor: pointer; padding: 2px 0;
    color: var(--text-white); font-size: 10px;
  }
  .region-cb input[type=checkbox] { accent-color: var(--gold); width: 13px; height: 13px; }
  .region-cb .star { color: var(--gold); }

  /* Generic sidebar button */
  .sb-btn {
    display: block;
    width: calc(100% - 24px);
    margin: 0 12px 4px;
    padding: 7px 10px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text-dim);
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    cursor: pointer; text-align: left;
    transition: background 0.15s, color 0.15s;
  }
  .sb-btn:hover { background: var(--bg-hover); color: var(--text-white); }

  /* ── Main content ── */
  #content {
    flex: 1; display: flex; flex-direction: column;
    overflow: hidden; background: var(--bg-dark);
  }
  .gold-bar { height: 2px; background: var(--gold-dim); flex-shrink: 0; }

  #top-bar {
    background: var(--bg-panel);
    padding: 0 14px; height: 42px;
    display: flex; align-items: center; gap: 10px;
    flex-shrink: 0;
  }
  #top-bar .icon { color: var(--text-dim); font-size: 13px; }
  #search-input {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 5px 10px;
    color: var(--text-white);
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px; width: 210px; outline: none;
  }
  #search-input::placeholder { color: var(--text-muted); }
  #search-input:focus { border-color: var(--gold-dim); }
  #count-label  { color: var(--text-dim); font-size: 10px; }
  #region-label { color: var(--text-dim); font-size: 10px; }

  #search-btn {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 3px;
    color: var(--gold);
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    padding: 5px 10px;
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.15s, border-color 0.15s;
    flex-shrink: 0;
  }
  #search-btn:hover { background: var(--bg-hover); border-color: var(--gold-dim); }
  #search-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  /* Lookup result banner */
  #lookup-banner {
    display: none;
    background: var(--bg-card);
    border-bottom: 1px solid var(--border);
    padding: 6px 14px;
    font-size: 10px;
    color: var(--text-dim);
    flex-shrink: 0;
    align-items: center;
    gap: 10px;
  }
  #lookup-banner.visible { display: flex; }
  #lookup-banner.found   { border-left: 3px solid var(--green-light); }
  #lookup-banner.notfound{ border-left: 3px solid var(--red-light); }
  #lookup-banner.searching{ border-left: 3px solid var(--gold); }
  #lookup-dismiss {
    margin-left: auto;
    background: none; border: none;
    color: var(--text-muted); cursor: pointer; font-size: 12px;
    padding: 0 4px;
  }
  #lookup-dismiss:hover { color: var(--text-white); }

  /* Manually looked-up row highlight */
  .row.lookup-row { background: #1a2010 !important; }
  .row.lookup-row:hover { background: #243018 !important; }

  /* ── Table ── */
  #table-wrap { flex: 1; overflow: hidden; display: flex; flex-direction: column; }

  #thead {
    background: var(--bg-card);
    border-bottom: 1px solid var(--gold-dim);
    display: grid;
    grid-template-columns: 70px 220px 110px 100px 1fr;
    flex-shrink: 0;
  }
  .th {
    padding: 6px 8px; font-size: 9px; font-weight: bold;
    color: var(--gold); letter-spacing: 0.06em;
    cursor: pointer; user-select: none;
    display: flex; align-items: center; gap: 4px;
  }
  .th:hover { color: var(--gold-light); }
  .th.sort-active { color: var(--gold-light); }
  .th-rank { justify-content: flex-end; padding-right: 12px; }
  .th-pts  { justify-content: flex-end; padding-right: 12px; }
  .sort-arrow { font-size: 8px; }

  #tbody-scroll { overflow-y: auto; flex: 1; }
  #tbody-scroll::-webkit-scrollbar { width: 10px; }
  #tbody-scroll::-webkit-scrollbar-track { background: var(--bg-panel); }
  #tbody-scroll::-webkit-scrollbar-thumb { background: var(--gold-dim); border-radius: 3px; }
  #tbody-scroll::-webkit-scrollbar-thumb:hover { background: var(--gold); }

  .row {
    display: grid;
    grid-template-columns: 70px 220px 110px 100px 1fr;
    height: 32px; align-items: center;
    border-bottom: 1px solid rgba(51,48,37,0.4);
    transition: background 0.08s;
  }
  .row:nth-child(even) { background: var(--bg-row-b); }
  .row:nth-child(odd)  { background: var(--bg-row-a); }
  .row:hover           { background: var(--bg-hover); }

  .td { padding: 0 8px; overflow: hidden; white-space: nowrap; }
  .td-rank { text-align: right; padding-right: 12px; font-size: 11px; font-weight: bold; }
  .td-rank.r1 { color: #c8a84b; }
  .td-rank.r2 { color: #c0c0c0; }
  .td-rank.r3 { color: #cd7f32; }
  .td-rank.rn { color: var(--text-dim); }
  .td-name { font-size: 11px; color: var(--text-white); }
  .td-name a { color: inherit; text-decoration: none; }
  .td-name a:hover { color: var(--gold-light); text-decoration: underline; }
  .td-pts { text-align: right; padding-right: 12px; color: var(--gold-light); font-size: 11px; }
  .td-regions { display: flex; flex-wrap: nowrap; gap: 4px; align-items: center; overflow: hidden; padding: 0 6px; }

  .chip {
    display: inline-block; padding: 1px 6px; border-radius: 2px;
    font-size: 9px; font-weight: bold;
    font-family: 'Share Tech Mono', monospace;
    white-space: nowrap; flex-shrink: 0;
  }
  .unknown-txt { color: var(--text-muted); font-size: 10px; }

  .td-pct { text-align: left; padding-right: 8px; font-size: 10px; color: var(--text-dim); overflow: visible; }
  .pct-bar-wrap {
    width: 52px; height: 6px;
    background: var(--bg-card);
    border-radius: 3px;
    overflow: hidden;
    display: inline-block;
    vertical-align: middle;
    margin-right: 4px;
  }
  .pct-bar {
    height: 100%;
    border-radius: 3px;
    background: var(--gold-dim);
    transition: width 0.2s;
  }
  .pct-bar.pct-high { background: var(--gold); }
  .th-pct { justify-content: center; }

  #empty-state {
    display: none; text-align: center;
    padding: 60px 20px; color: var(--text-muted); font-size: 13px;
  }

  /* Loading overlay */
  #loading {
    position: fixed; inset: 0; background: var(--bg-dark);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 16px; z-index: 100;
  }
  #loading h2 { font-family: 'IM Fell English', serif; font-size: 22px; color: var(--gold); }
  #loading p  { color: var(--text-dim); font-size: 11px; }
  .spinner {
    width: 40px; height: 40px;
    border: 3px solid var(--gold-faint);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 0.9s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  #error-msg {
    display: none;
    background: #2a0808; border: 1px solid var(--red);
    border-radius: 4px; padding: 12px 16px; margin: 20px;
    color: #ffaaaa; font-size: 11px; line-height: 1.7;
  }

  /* Status bar */
  #status-bar {
    background: var(--bg-panel);
    border-top: 1px solid var(--border);
    padding: 5px 14px;
    font-size: 10px; color: var(--text-dim);
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: space-between;
  }
  #export-btn {
    background: none; border: 1px solid var(--border); border-radius: 3px;
    color: var(--text-dim); font-family: 'Share Tech Mono', monospace;
    font-size: 10px; padding: 2px 8px; cursor: pointer;
    transition: color 0.15s, border-color 0.15s;
  }
  #export-btn:hover { color: var(--text-white); border-color: var(--gold-dim); }
</style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <h2>☠ Demonic Pacts League</h2>
  <p>Loading leaderboard data…</p>
</div>

<div id="app" style="display:none;">

  <div id="header">
    <span class="skull">☠</span>
    <div id="header-text">
      <h1>DEMONIC PACTS LEAGUE</h1>
      <p>Leagues VI &nbsp;•&nbsp; April 15 – June 10, 2026</p>
    </div>
    <div id="header-right">
      <a href="https://github.com/BauwsLOA/OSRS-Demonic-Pacts-Leaderboards" target="_blank" rel="noopener" style="display:inline-flex;align-items:center;gap:6px;color:var(--text-dim);text-decoration:none;font-size:11px;" onmouseover="this.style.color='var(--text-white)'" onmouseout="this.style.color='var(--text-dim)'">

  <div id="body">

    <!-- Sidebar -->
    <div id="sidebar">

      <div class="sb-section">LEADERBOARD</div>

      <div class="pages-row">
        <span>Pages:</span>
        <input type="number" id="pages-input" value="4" min="1" max="800">
        <span style="color:var(--text-muted)">×25</span>
      </div>

      <button class="fetch-btn" id="btn-fetch-lb">⚔ FETCH LEADERBOARD</button>
      <button class="fetch-btn" id="btn-fetch-reg">🗺 FETCH REGIONS</button>

      <div class="sb-divider"></div>

      <div class="match-mode">
        <label><input type="radio" name="matchmode" value="any" checked> Match ANY</label>

      <button class="sb-btn" id="clear-btn">✕&nbsp; Clear Filters</button>

    </div>

    <!-- Content -->
    <div id="content">
      <div class="gold-bar"></div>

      <div id="top-bar">
        <span class="icon">🔍</span>
        <input type="text" id="search-input" placeholder="Search or Enter to lookup player…" autocomplete="off">
        <button id="search-btn">🔎 LOOKUP</button>
        <span id="count-label"></span>
        <span id="region-label"></span>
      </div>

      <div id="lookup-banner">
        <span id="lookup-msg"></span>
        <button id="lookup-dismiss">✕</button>
      </div>

      <div id="table-wrap">
        <div id="thead">
          <div class="th th-rank" data-col="rank">RANK <span class="sort-arrow">▼</span></div>
          <div class="th"         data-col="name">PLAYER NAME <span class="sort-arrow"></span></div>
          <div class="th th-pts"  data-col="points">LEAGUE PTS <span class="sort-arrow"></span></div>
          <div class="th th-pct"  data-col="pct">% to MAX <span class="sort-arrow"></span></div>
          <div class="th"         data-col="regions">REGIONS <span class="sort-arrow"></span></div>

        <div id="tbody-scroll">
          <div id="tbody"></div>
          <div id="empty-state">No players match the current filter.</div>

        <a href="https://github.com/BauwsLOA/OSRS-Demonic-Pacts-Leaderboards" target="_blank" rel="noopener" style="display:inline-flex;align-items:center;gap:6px;color:var(--text-dim);text-decoration:none;font-size:11px;" onmouseover="this.style.color='var(--text-white)'" onmouseout="this.style.color='var(--text-dim)'">

            GitHub

        <span id="status-text">Loading…</span>
        <button id="export-btn">↓ Export CSV</button>
      </div>
    </div>
  </div>

<script>
// ─────────────────────────────────────────────────────────────────────────────
//  CONFIG — paste your Cloudflare Worker URL here
// ─────────────────────────────────────────────────────────────────────────────
const PROXY = "https://osrs-proxy.bauwsloa.workers.dev";
const MAX_PTS = 96040;

// ─────────────────────────────────────────────────────────────────────────────
//  Constants
// ─────────────────────────────────────────────────────────────────────────────
const BASE            = "https://secure.runescape.com";
const LEADERBOARD_URL = `${BASE}/m=hiscore_oldschool_seasonal/overall.ws`;
const LEADERBOARD_PRM = { category_type: 1, table: 1 };
const TEMPLE_API      = "https://templeosrs.com/api/leagues/vi/tracking.php";

const AREA_MAP = {
  asgarnia:   "Asgarnia",
  desert:     "Desert",
  fremennik:  "Fremennik Province",
  kandarin:   "Kandarin",
  kourend:    "Kebos and Kourend",
  morytania:  "Morytania",
  tirannwn:   "Tirannwn",
  wilderness: "Wilderness",
};
const ALWAYS_UNLOCKED = ["Varlamore", "Karamja"];
const ALL_REGIONS = [
  "Varlamore","Karamja","Asgarnia","Desert",
  "Fremennik Province","Kandarin","Kebos and Kourend",
  "Morytania","Tirannwn","Wilderness"
];

const REGION_COLORS = {
  "Varlamore":          { bg:"#7b3f9e", fg:"#e8d0ff" },
  "Karamja":            { bg:"#2d7a3a", fg:"#0d0d0d" },
  "Asgarnia":           { bg:"#1a5fa8", fg:"#c8ddff" },
  "Desert":             { bg:"#a86e1a", fg:"#0d0d0d" },
  "Fremennik Province": { bg:"#2a6b7c", fg:"#c8eeff" },
  "Kandarin":           { bg:"#4a7a2a", fg:"#0d0d0d" },
  "Kebos and Kourend":  { bg:"#6b2a6b", fg:"#e8c8e8" },
  "Morytania":          { bg:"#5a2020", fg:"#ffbbbb" },
  "Tirannwn":           { bg:"#1e6b4a", fg:"#b8ffe0" },
  "Wilderness":         { bg:"#6b3a1a", fg:"#ffd8b8" },
};

// ─────────────────────────────────────────────────────────────────────────────
//  State
// ─────────────────────────────────────────────────────────────────────────────
let allPlayers  = [];
let filtered    = [];
let sortCol     = "rank";
let sortRev     = false;
let debounceT   = null;
let fetching    = false;

// localStorage cache key
const LS_KEY = "demonic_pacts_players";

function loadLocalCache() {
  try { return JSON.parse(localStorage.getItem(LS_KEY) || "{}"); } catch { return {}; }
}
function saveLocalCache(pc) {
  try { localStorage.setItem(LS_KEY, JSON.stringify(pc)); } catch {}
}

// ─────────────────────────────────────────────────────────────────────────────
//  Proxy helpers
// ─────────────────────────────────────────────────────────────────────────────
function proxyUrl(target) {
  return `${PROXY}?url=${encodeURIComponent(target)}`;
}

async function proxyGet(url) {
  const r = await fetch(proxyUrl(url));
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  return r;
}

// ─────────────────────────────────────────────────────────────────────────────
//  Parse leaderboard HTML
// ─────────────────────────────────────────────────────────────────────────────
const ROW_RE = /<td[^>]*>\s*(\d[\d,]*)\s*<\/td>\s*<td[^>]*>.*?<a[^>]*>([^<]+)<\/a>.*?<\/td>\s*<td[^>]*>\s*([\d,]+)\s*<\/td>/gsi;

function parseLeaderboard(html) {
  const players = [];
  ROW_RE.lastIndex = 0;
  let m;
  while ((m = ROW_RE.exec(html)) !== null) {
    try {
      players.push({
        rank:    parseInt(m[1].replace(/,/g, "")),
        name:    m[2].trim(),
        points:  parseInt(m[3].replace(/,/g, "")),
        regions: [],
      });
    } catch {}
  }
  return players;
}

// ─────────────────────────────────────────────────────────────────────────────
//  Parse TempleOSRS regions
// ─────────────────────────────────────────────────────────────────────────────
function parseAreas(data) {
  const regions = [...ALWAYS_UNLOCKED];
  const areas = data?.info?.areas || {};
  for (const [key, val] of Object.entries(areas)) {
    if (val === 1 && AREA_MAP[key]) regions.push(AREA_MAP[key]);
  }
  return regions;
}

// ─────────────────────────────────────────────────────────────────────────────
//  Fetch leaderboard
// ─────────────────────────────────────────────────────────────────────────────
async function fetchLeaderboard() {
  if (fetching) return;
  fetching = true;

  const pages = Math.max(1, Math.min(parseInt(document.getElementById("pages-input").value) || 4, 800));
  const pc    = loadLocalCache();

  setStatus("Fetching leaderboard…", "gold");
  setBtnsDisabled(true);
  setProgress(0);

  const newPlayers = [];

  for (let page = 1; page <= pages; page++) {
    setStatus(`Fetching page ${page}/${pages}…`, "gold");
    setProgress(page / pages);

    const params = new URLSearchParams({ ...LEADERBOARD_PRM, page });
    const url    = `${LEADERBOARD_URL}?${params}`;

    try {
      const r    = await proxyGet(url);
      const html = await r.text();
      const rows = parseLeaderboard(html);
      if (rows.length === 0 && page > 1) break;
      for (const p of rows) {
        p.regions = pc[p.name] || [];
        newPlayers.push(p);
      }
    } catch (e) {
      setStatus(`Error on page ${page}: ${e.message}`, "red");
      break;
    }

    if (page < pages) await sleep(300);
  }

  allPlayers = newPlayers;
  filtered   = [...allPlayers];
  renderTable();
  updateStats();
  setStatus(`Loaded ${allPlayers.length.toLocaleString()} players.`, "green");
  setProgress(1);
  setBtnsDisabled(false);
  fetching = false;

  // Update snapshot time
  document.getElementById("generated-time").innerHTML =
    `Live fetch<br>${new Date().toLocaleTimeString()}`;
}

// ─────────────────────────────────────────────────────────────────────────────
//  Fetch regions (concurrent)
// ─────────────────────────────────────────────────────────────────────────────
async function fetchRegions() {
  if (fetching) return;
  if (allPlayers.length === 0) {
    setStatus("Fetch the leaderboard first.", "red");
    return;
  }

  fetching = true;
  setBtnsDisabled(true);

  const needs = allPlayers.filter(p => !p.regions || p.regions.length === 0);
  const total = needs.length;

  if (total === 0) {
    setStatus("All regions already fetched.", "green");
    setBtnsDisabled(false);
    fetching = false;
    return;
  }

  const pc      = loadLocalCache();
  let done      = 0;
  let ok        = 0;
  const BATCH   = 10; // concurrent requests

  setStatus(`Fetching regions for ${total.toLocaleString()} players…`, "gold");
  setProgress(0);

  for (let i = 0; i < needs.length; i += BATCH) {
    const batch = needs.slice(i, i + BATCH);

    await Promise.all(batch.map(async (player) => {
      const url = `${TEMPLE_API}?player=${encodeURIComponent(player.name)}`;
      try {
        const r    = await proxyGet(url);
        const data = await r.json();
        if (!data.error && data.info) {
          player.regions = parseAreas(data);
          pc[player.name] = player.regions;
          ok++;
        } else {
          player.regions = [];
        }
      } catch {
        // leave regions empty
      }
      done++;
    }));

    saveLocalCache(pc);
    setProgress(done / total);
    setStatus(`Regions [${done}/${total}]  ${ok} found  •  ${done - ok} untracked/errors`, "gold");
    applyFilter(); // refresh table live
    await sleep(50); // small yield so UI stays responsive
  }

  saveLocalCache(pc);
  applyFilter();
  setStatus(`Done — ${ok.toLocaleString()} regions found out of ${total.toLocaleString()} players.`, "green");
  setProgress(1);
  setBtnsDisabled(false);
  fetching = false;
}

// ─────────────────────────────────────────────────────────────────────────────
//  Render
// ─────────────────────────────────────────────────────────────────────────────
function chipHTML(region) {
  const c = REGION_COLORS[region] || { bg:"#555", fg:"#fff" };
  return `<span class="chip" style="background:${c.bg};color:${c.fg}">${escH(region)}</span>`;
}
function escH(s) {
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}
function rankClass(r) {
  return r===1?"r1":r===2?"r2":r===3?"r3":"rn";
}

function renderTable() {
  const tbody = document.getElementById("tbody");
  const empty = document.getElementById("empty-state");
  if (filtered.length === 0) {
    tbody.innerHTML = "";
    empty.style.display = "block";
    return;
  }
  empty.style.display = "none";
  const frag = document.createDocumentFragment();
  for (const p of filtered) {
    const row = document.createElement("div");
    row.className = "row" + (p._lookup ? " lookup-row" : "");
    const regions = p.regions || [];
    const regHTML = regions.length
      ? regions.map(chipHTML).join("")
      : '<span class="unknown-txt">Unknown</span>';
    const osrsUrl = `https://secure.runescape.com/m=hiscore_oldschool_seasonal/hiscorepersonal.ws?user1=${encodeURIComponent(p.name)}`;
    const rankDisp = p.rank   ? p.rank.toLocaleString()   : "—";
    const ptsDisp  = p.points ? p.points.toLocaleString() : "—";
    const pct      = p.points ? Math.min(100, (p.points / MAX_PTS) * 100) : 0;
    const pctDisp  = p.points ? pct.toFixed(1) + "%" : "—";
    const pctHigh  = pct >= 75 ? " pct-high" : "";
    const pctHTML  = p.points
      ? `<div class="pct-bar-wrap"><div class="pct-bar${pctHigh}" style="width:${pct.toFixed(1)}%"></div></div>${pctDisp}`
      : "—";
    row.innerHTML =
      `<div class="td td-rank ${p.rank ? rankClass(p.rank) : "rn"}">${rankDisp}</div>` +
      `<div class="td td-name"><a href="${osrsUrl}" target="_blank" rel="noopener">${escH(p.name)}</a></div>` +
      `<div class="td td-pts">${ptsDisp}</div>` +
      `<div class="td td-pct">${pctHTML}</div>` +
      `<div class="td td-regions">${regHTML}</div>`;
    frag.appendChild(row);
  }
  tbody.innerHTML = "";
  tbody.appendChild(frag);
}

// ─────────────────────────────────────────────────────────────────────────────
//  Player lookup — fires on Enter or LOOKUP button when name not in table
// ─────────────────────────────────────────────────────────────────────────────

const JAGEX_PLAYER_URL = "https://secure.runescape.com/m=hiscore_oldschool_seasonal/index_lite.ws";

function setLookupBanner(state, msg) {
  const banner = document.getElementById("lookup-banner");
  banner.className = state ? `visible ${state}` : "";
  document.getElementById("lookup-msg").textContent = msg;
}

async function lookupPlayer() {
  const name = document.getElementById("search-input").value.trim();
  if (!name) return;

  // Exact match already loaded — just confirm it
  const exact = allPlayers.find(p => p.name.toLowerCase() === name.toLowerCase());
  if (exact) {
    setLookupBanner("found", `✔ ${exact.name} is already loaded — rank #${exact.rank ? exact.rank.toLocaleString() : "?"}.`);
    return;
  }

  const btn = document.getElementById("search-btn");
  btn.disabled = true;
  setLookupBanner("searching", `🔍 Looking up "${name}"…`);

  try {
    const [hiscoreResp, templeResp] = await Promise.allSettled([
      proxyGet(`${JAGEX_PLAYER_URL}?player=${encodeURIComponent(name.replace(/ /g, '_'))}`),
      proxyGet(`${TEMPLE_API}?player=${encodeURIComponent(name)}`),
    ]);

    let rank = null, points = null, regions = [];

    // Jagex index_lite CSV for seasonal hiscores:
    // Lines 0-23 = skills (overall first), then activities follow.
    // For Leagues VI, league points is the LAST line of the CSV.
    // Each line: rank,level_or_score,xp (skills) or rank,score (activities)
    if (hiscoreResp.status === "fulfilled") {
      try {
        const text  = await hiscoreResp.value.text();
        const lines = text.trim().split("\n").map(l => l.trim()).filter(Boolean);

        // Overall rank is always line 0, col 0
        if (lines.length > 0) {
          const overallParts = lines[0].split(",");
          const r = parseInt(overallParts[0]);
          if (!isNaN(r) && r > 0) rank = r;
        }

        // League points: last line of the CSV, format "rank,score"
        // Also try scanning all activity lines (after the 24 skill lines) for the highest score
        const activityLines = lines.slice(24); // skip 24 skill lines
        let bestPts = 0;
        for (const line of activityLines) {
          const parts = line.split(",");
          const score = parseInt(parts[1]);
          if (!isNaN(score) && score > bestPts) bestPts = score;
        }
        if (bestPts > 0) points = bestPts;

        // Fallback: if no activity lines found, try overall line col 1
        if (!points && lines.length > 0) {
          const p = parseInt(lines[0].split(",")[1]);
          if (!isNaN(p) && p > 0) points = p;
        }
      } catch {}
    }

    // TempleOSRS regions
    if (templeResp.status === "fulfilled") {
      try {
        const data = await templeResp.value.json();
        if (!data.error && data.info) {
          regions = parseAreas(data);
          const pc = loadLocalCache();
          pc[name] = regions;
          saveLocalCache(pc);
        } else {
          // Player not tracked on TempleOSRS — silently submit a tracking request
          // so they'll be available on the next lookup
          fetch(`https://templeosrs.com/php/add_datapoint.php?player=${encodeURIComponent(name)}`).catch(() => {});
        }
      } catch {}
    }

    if (!rank && !points && regions.length === 0) {
      setLookupBanner("notfound", `✘ "${name}" not found — they may not be on the seasonal hiscores.`);
      btn.disabled = false;
      return;
    }

    // Remove any previous manual lookup for this name
    const idx = allPlayers.findIndex(p => p._lookup && p.name.toLowerCase() === name.toLowerCase());
    if (idx !== -1) allPlayers.splice(idx, 1);

    const player = { rank, name, points: points || 0, regions, _lookup: true };
    allPlayers.unshift(player);
    applyFilter();

    const rankStr = rank   ? `rank #${rank.toLocaleString()}`   : "unranked";
    const ptsStr  = points ? `${points.toLocaleString()} pts`   : "no points data";
    const regStr  = regions.length ? regions.join(", ")         : "no region data";
    setLookupBanner("found", `✔ Found ${player.name} — ${rankStr}, ${ptsStr} | Regions: ${regStr}`);

  } catch (e) {
    setLookupBanner("notfound", `✘ Lookup failed: ${e.message}`);
  }

  btn.disabled = false;
}

// ─────────────────────────────────────────────────────────────────────────────
//  Filter + sort
// ─────────────────────────────────────────────────────────────────────────────
function applyFilter() {
  const query   = document.getElementById("search-input").value.toLowerCase().trim();
  const selSet  = new Set(
    Array.from(document.querySelectorAll("#region-list input:checked")).map(cb => cb.value.toLowerCase())
  );
  const mode    = document.querySelector("input[name=matchmode]:checked").value;

  let result = allPlayers;
  if (query)       result = result.filter(p => p.name.toLowerCase().includes(query));
  if (selSet.size) {
    result = result.filter(p => {
      const pr = new Set((p.regions||[]).map(r=>r.toLowerCase()));
      return mode === "all"
        ? [...selSet].every(r => pr.has(r))
        : [...selSet].some(r  => pr.has(r));
    });
  }

  filtered = result;
  renderTable();
  updateStats();
}

function sortPlayers(col) {
  sortRev = sortCol === col ? !sortRev : col === "points";
  sortCol = col;

  allPlayers.sort((a,b) => {
    let va = col==="regions" ? (a.regions||[]).length
           : col==="name"    ? a.name.toLowerCase()
           : col==="pct"     ? (a.points||0)
           : a[col]||0;
    let vb = col==="regions" ? (b.regions||[]).length
           : col==="name"    ? b.name.toLowerCase()
           : col==="pct"     ? (b.points||0)
           : b[col]||0;
    if (va<vb) return sortRev?1:-1;
    if (va>vb) return sortRev?-1:1;
    return 0;
  });

  document.querySelectorAll(".th").forEach(th => {
    const arrow = th.querySelector(".sort-arrow");
    if (th.dataset.col === col) {
      th.classList.add("sort-active");
      arrow.textContent = sortRev ? "▲" : "▼";
    } else {
      th.classList.remove("sort-active");
      arrow.textContent = "";
    }
  });

  applyFilter();
}

// ─────────────────────────────────────────────────────────────────────────────
//  Stats + UI helpers
// ─────────────────────────────────────────────────────────────────────────────
function updateStats() {
  const total = allPlayers.length;
  const known = allPlayers.filter(p=>p.regions&&p.regions.length>0).length;
  document.getElementById("count-label").textContent  = `Showing ${filtered.length.toLocaleString()} / ${total.toLocaleString()}`;
  document.getElementById("region-label").textContent = `│  Regions: ${known.toLocaleString()}/${total.toLocaleString()}`;
}

function setStatus(msg, color="dim") {
  const el = document.getElementById("status-text");
  el.style.color = {gold:"#c8a84b",green:"#3a8a3a",red:"#c0392b",dim:"#888070"}[color]||"#888070";
  el.textContent = msg;
}

function setProgress(frac) {
  document.getElementById("progress-bar").style.width = `${Math.round(frac*100)}%`;
}

function setBtnsDisabled(dis) {
  document.getElementById("btn-fetch-lb").disabled  = dis;
  document.getElementById("btn-fetch-reg").disabled = dis;
  document.getElementById("btn-fetch-lb").textContent  = dis ? "⏳ FETCHING…"       : "⚔ FETCH LEADERBOARD";
  document.getElementById("btn-fetch-reg").textContent = dis ? "⏳ FETCHING…"       : "🗺 FETCH REGIONS";
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

function exportCSV() {
  const rows = ["Rank,Name,LeaguePoints,Regions"];
  for (const p of filtered) {
    const rstr = (p.regions||[]).join("|") || "Unknown";
    rows.push(`${p.rank},"${p.name}",${p.points},"${rstr}"`);
  }
  const a    = document.createElement("a");
  a.href     = URL.createObjectURL(new Blob([rows.join("\n")],{type:"text/csv"}));
  a.download = "league_export.csv";
  a.click();
  URL.revokeObjectURL(a.href);
}

// ─────────────────────────────────────────────────────────────────────────────
//  Build region sidebar
// ─────────────────────────────────────────────────────────────────────────────
function buildRegionList() {
  const list = document.getElementById("region-list");
  ALL_REGIONS.forEach(region => {
    const label = document.createElement("label");
    label.className = "region-cb";
    const cb = document.createElement("input");
    cb.type = "checkbox"; cb.value = region;
    cb.addEventListener("change", applyFilter);
    label.appendChild(cb);
    const star = ALWAYS_UNLOCKED.includes(region) ? ' <span class="star">★</span>' : "";
    label.innerHTML += region + star;
    list.appendChild(label);
  });
}

// ─────────────────────────────────────────────────────────────────────────────
//  Init
// ─────────────────────────────────────────────────────────────────────────────
async function init() {
  buildRegionList();

  document.getElementById("search-input").addEventListener("input", () => {
    clearTimeout(debounceT);
    debounceT = setTimeout(applyFilter, 180);
  });
  document.getElementById("search-input").addEventListener("keydown", (e) => {
    if (e.key === "Enter") lookupPlayer();
  });
  document.getElementById("search-btn").addEventListener("click", lookupPlayer);
  document.getElementById("lookup-dismiss").addEventListener("click", () => {
    setLookupBanner(null, "");
  });
  document.getElementById("clear-btn").addEventListener("click", () => {
    document.querySelectorAll("#region-list input").forEach(cb => cb.checked=false);
    document.getElementById("search-input").value = "";
    applyFilter();
  });
  document.getElementById("btn-fetch-lb").addEventListener("click",  fetchLeaderboard);
  document.getElementById("btn-fetch-reg").addEventListener("click", fetchRegions);
  document.getElementById("export-btn").addEventListener("click",        exportCSV);
  document.getElementById("sidebar-export-btn").addEventListener("click",exportCSV);
  document.querySelectorAll(".th").forEach(th =>
    th.addEventListener("click", () => sortPlayers(th.dataset.col))
  );
  document.querySelectorAll("input[name=matchmode]").forEach(r =>
    r.addEventListener("change", applyFilter)
  );

  // Try loading leaderboard_data.json first (from GitHub Action)
  try {
    const resp = await fetch("leaderboard_data.json");
    if (!resp.ok) throw new Error("no json");
    const data = await resp.json();
    const pc   = loadLocalCache();

    allPlayers = (data.players || []).map(p => ({
      ...p,
      regions: pc[p.name] || p.regions || [],
    }));
    filtered = [...allPlayers];

    if (data.generated) {
      const d = new Date(data.generated);
      document.getElementById("generated-time").innerHTML =
        `Last auto-update<br>${d.toLocaleDateString()} ${d.toLocaleTimeString()}`;
    }

    renderTable();
    updateStats();
    setStatus(`${allPlayers.length.toLocaleString()} players loaded from snapshot. Hit Fetch to refresh.`, "gold");
  } catch {
    setStatus("No snapshot found — hit ⚔ FETCH LEADERBOARD to load data.", "dim");
  }

  document.getElementById("loading").style.display = "none";
  document.getElementById("app").style.display     = "flex";
}

init();
</script>
